name: Lint

on:
  push:
    branches: [ main, dev ]
  pull_request:

jobs:
  python:
    name: Python (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev tools
        run: uv sync --only-dev

      - name: Ruff
        run: uv run --no-sync ruff check .

      - name: Black
        run: uv run --no-sync black --check .
