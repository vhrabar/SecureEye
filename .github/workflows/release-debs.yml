name: Build Debian packages

# Builds binary .deb packages for amd64, amd64v3 (x86-64-v3) and arm64, uploads & attaches to release.
on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Baseline amd64.
          - name: amd64
            runner: ubuntu-24.04
            march: ""
            version_suffix: ""
            dpkg_flags: "-b"
            vendor_mediapipe: "true"
          # x86-64-v3 micro-architecture optimised amd64 build
          - name: amd64v3
            runner: ubuntu-24.04
            march: "x86-64-v3"
            version_suffix: "+v3"
            dpkg_flags: "-B"
            vendor_mediapipe: "true"
          # arm64 (native runner).
          - name: arm64
            runner: ubuntu-24.04-arm
            march: ""
            version_suffix: ""
            dpkg_flags: "-B"
            vendor_mediapipe: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            debhelper devscripts dpkg-dev build-essential fakeroot \
            meson ninja-build pkg-config cmake gettext \
            python3 python3-pip python3-venv \
            libpam0g-dev libevdev-dev libinih-dev

      - name: Stage debian/ at the source root
        run: |
          cp -r secureEye/debian ./debian
          rm -rf secureEye/debian

      - name: Set package version
        env:
          DEBEMAIL: "ci@secureeye"
          DEBFULLNAME: "SecureEye CI"
        run: |
          base="$(dpkg-parsechangelog -S Version)"
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.ref_name }}"
            base="${tag#v}-1"
          fi
          version="${base}${{ matrix.version_suffix }}"
          if [ "$version" != "$(dpkg-parsechangelog -S Version)" ]; then
            dch -b -v "$version" -D unstable -u low \
              "Automated CI build (${{ matrix.name }})"
          fi
          echo "Building secure-eye ${version}"
      # vendors mediapipe wheels if vendor_mediapipe is true.
      - name: Vendor Python wheels
        run: |
          mkdir -p debian/wheels
          if [ "${{ matrix.vendor_mediapipe }}" = "true" ]; then
            python3 -m pip download \
              --only-binary=:all: --no-cache-dir --no-deps \
              --platform manylinux_2_28_x86_64 \
              --platform manylinux_2_17_x86_64 \
              --platform manylinux2014_x86_64 \
              --dest debian/wheels \
              -r requirements-vendor.txt
          else
            grep -iv '^[[:space:]]*mediapipe' requirements-vendor.txt > /tmp/reqs.txt
            python3 -m pip download \
              --only-binary=:all: --no-cache-dir --no-deps \
              --dest debian/wheels \
              -r /tmp/reqs.txt
          fi
          ls -la debian/wheels

      - name: Build packages
        run: |
          if [ -n "${{ matrix.march }}" ]; then
            export DEB_CFLAGS_APPEND="-march=${{ matrix.march }}"
            export DEB_CXXFLAGS_APPEND="-march=${{ matrix.march }}"
          fi
          dpkg-buildpackage ${{ matrix.dpkg_flags }} -us -uc

      # dpkg-buildpackage writes the artifacts to the parent directory.
      - name: Collect artifacts
        run: |
          mkdir -p dist
          mv ../*.deb dist/ 2>/dev/null || true
          mv ../*.ddeb dist/ 2>/dev/null || true
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Attach to release
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: deb-*
          merge-multiple: true

      - name: List downloaded packages
        run: ls -la dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.ddeb
